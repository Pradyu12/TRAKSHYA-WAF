<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="titlebar.css">
</head>
<body>
<div class="titlebar">
  <div class="titlebar-app-name">TRAKSHYA WAF</div>
  <div class="titlebar-drag-zone" id="drag-zone"></div>
  <div class="titlebar-controls">
    <button class="titlebar-btn titlebar-minimize" onclick="window.trakshya?.minimizeToTray();window.parent.postMessage('minimize','*')" title="Minimize to tray">
      <svg viewBox="0 0 12 12" width="12" height="12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
    </button>
    <button class="titlebar-btn titlebar-close" onclick="window.parent.postMessage('close','*')" title="Close">
      <svg viewBox="0 0 12 12" width="12" height="12"><path d="M2,2 L10,10 M10,2 L2,10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </button>
  </div>
</div>
</body>
</html>
