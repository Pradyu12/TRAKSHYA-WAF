name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to build and push'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/trakshya-waf

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [dashboard, proxy, api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.event.inputs.image_tag || 'latest' }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.component == 'proxy' && 'rust/Dockerfile' || matrix.component == 'api' && format('{0}/Dockerfile', matrix.component) || 'dashboard/Dockerfile' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:buildcache,mode=max

      - name: Generate digest
        id: digest
        run: echo "digest=$(docker build --platform linux/amd64 -f ${{ matrix.component == 'proxy' && 'rust/Dockerfile' || matrix.component == 'api' && format('{0}/Dockerfile', matrix.component) || 'dashboard/Dockerfile' }} . | grep -o 'sha256:[a-f0-9]\{64\}' || true)" >> "$GITHUB_OUTPUT"

  update-helm-values:
    needs: build-and-push
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Update Helm image tags
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          sed -i "s|tag: latest|tag: $TAG|g" helm/trakshya-waf/values.yaml

      - name: Commit and push Helm updates
        run: |
          git add helm/trakshya-waf/values.yaml
          git commit -m "chore: update Helm image tags to $TAG"
          git push origin HEAD:${{ github.ref_name }}
