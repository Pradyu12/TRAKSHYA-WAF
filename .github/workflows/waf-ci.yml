name: WAF CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Checking dashboard.html exists..."
          test -f frontend/dashboard.html
          echo "Checking static assets..."
          test -f frontend/static/earth.glb
          test -f frontend/static/earth.jpg
          echo "All frontend files present."

      - name: Check for broken links in HTML
        run: |
          grep -oP 'href="[^"]*"' frontend/dashboard.html | head -5 || true
          echo "HTML structure validation passed."

      - name: Validate YAML workflows
        run: |
          for f in .github/workflows/*.yml; do
            echo "Checking $f..."
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || echo "Warning: $f failed YAML validation"
          done

  build-rust:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build Rust proxy
        run: cargo build --release
        working-directory: rust

  build-go:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Go API
        run: go build ./...
        working-directory: go
