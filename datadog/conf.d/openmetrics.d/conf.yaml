# Datadog OpenMetrics Integration: TRAKSHYA WAF Prometheus Metrics
#
# The Datadog Agent scrapes the WAF's /metrics Prometheus endpoint
# and maps metrics into the "trakshya_waf" namespace in Datadog.
#
instances:
  - openmetrics_endpoint: http://waf:8000/metrics
    namespace: trakshya_waf
    metrics:
      - waf_requests_total
      - waf_blocked_total
      - waf_request_duration_seconds
      - waf_active_connections
      - waf_upstream_timeouts_total
    tags:
      - app:trakshya-waf
      - team:security
    min_collection_interval: 15
