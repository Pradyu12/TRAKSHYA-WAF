# TRAKSHYA-WAF Configuration
# Shared configuration for all components (Rust proxy, Go API)

database_path: /data/trakshya_events.duckdb

global:
  log_level: info
  data_dir: /var/lib/trakshya

proxy:
  port: 8080
  upstream_url: http://localhost:3000
  posture: monitor  # monitor | standard | under_attack
  management_api_url: http://localhost:8000

rate_limiter:
  enabled: true
  requests_per_minute: 60
  burst_size: 10

circuit_breaker:
  enabled: true
  failure_threshold: 5
  recovery_timeout_secs: 30
  half_open_max_requests: 3

api:
  port: 8000
  api_key: ""  # empty means localhost-only (secure by default)

c_system_monitor:
  port: 9001
  enabled: true

geoip:
  enabled: false
  db_path: /var/lib/trakshya/GeoLite2-City.mmdb
  blocked_countries: []

jwt:
  enabled: false
  secret: ""
  required_role: "admin"

trusted_ips:
  - 127.0.0.1
  - ::1

webhooks:
  slack_webhook_url: ""
  discord_webhook_url: ""

telemetry:
  prometheus_enabled: true
  otlp_endpoint: ""
