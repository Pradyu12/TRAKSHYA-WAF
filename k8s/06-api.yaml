apiVersion: apps/v1
kind: Deployment
metadata:
  name: trakshya-api
  namespace: trakshya-waf
  labels:
    app.kubernetes.io/name: trakshya-waf
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trakshya-waf
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trakshya-waf
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: pradyu12/trakshya-waf-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: trakshya-config
            - secretRef:
                name: trakshya-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trakshya-data
