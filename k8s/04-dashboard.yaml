apiVersion: apps/v1
kind: Deployment
metadata:
  name: trakshya-dashboard
  namespace: trakshya-waf
  labels:
    app.kubernetes.io/name: trakshya-waf
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trakshya-waf
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trakshya-waf
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: pradyu12/trakshya-waf-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: frontend
          configMap:
            name: trakshya-frontend
