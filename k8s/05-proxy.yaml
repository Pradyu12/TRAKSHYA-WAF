apiVersion: apps/v1
kind: Deployment
metadata:
  name: trakshya-proxy
  namespace: trakshya-waf
  labels:
    app.kubernetes.io/name: trakshya-waf
    app.kubernetes.io/component: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: trakshya-waf
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trakshya-waf
        app.kubernetes.io/component: proxy
    spec:
      containers:
        - name: proxy
          image: pradyu12/trakshya-waf-proxy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          envFrom:
            - configMapRef:
                name: trakshya-config
            - secretRef:
                name: trakshya-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trakshya-data
