apiVersion: v1
kind: Service
metadata:
  name: trakshya-api
  namespace: trakshya-waf
  labels:
    app.kubernetes.io/name: trakshya-waf
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: trakshya-waf
    app.kubernetes.io/component: api
