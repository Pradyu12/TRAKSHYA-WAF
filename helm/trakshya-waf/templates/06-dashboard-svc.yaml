{{- $name := include "trakshya-waf.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "trakshya-waf.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "trakshya-waf.name" . }}
    app.kubernetes.io/component: dashboard
