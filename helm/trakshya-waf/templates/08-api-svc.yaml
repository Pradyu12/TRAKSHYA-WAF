{{- $name := include "trakshya-waf.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "trakshya-waf.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
    - name: metrics
      port: {{ .Values.api.service.metricsPort }}
      targetPort: metrics
  selector:
    app.kubernetes.io/name: {{ include "trakshya-waf.name" . }}
    app.kubernetes.io/component: api
