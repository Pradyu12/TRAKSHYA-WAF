{{- $name := include "trakshya-waf.fullname" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "trakshya-waf.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  API_KEY: {{ .Values.secrets.apiKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhook | quote }}
  DISCORD_WEBHOOK_URL: {{ .Values.secrets.discordWebhook | quote }}
