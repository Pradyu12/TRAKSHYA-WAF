version: "3.8"

services:
  kalki-proxy:
    build:
      context: ./rust
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - KALKI_CONFIG=/etc/kalki/config.yaml
      - KALKI_PROXY_PORT=8080
      - KALKI_UPSTREAM_URL=http://upstream:3000
      - KALKI_MGMT_API_URL=http://kalki-api:8000
      - RUST_LOG=info
    volumes:
      - ./config/kalki.yaml:/etc/kalki/config.yaml:ro
      - kalki-data:/var/lib/kalki
    depends_on:
      - kalki-api
    networks:
      - kalki-net
    restart: unless-stopped

  kalki-api:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KALKI_MGMT_PORT=8000
      - KALKI_DB_PATH=/var/lib/kalki/kalki.db
      - KALKI_FRONTEND_DIR=/opt/kalki/frontend
      - KALKI_API_KEY=${KALKI_API_KEY:-}
    volumes:
      - kalki-data:/var/lib/kalki
      - ./frontend:/opt/kalki/frontend:ro
    networks:
      - kalki-net
    restart: unless-stopped

  kalki-systemd:
    build:
      context: ./c
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    volumes:
      - /var/log:/var/log:ro
      - /etc:/etc:ro
      - kalki-data:/var/lib/kalki
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    networks:
      - kalki-net
    restart: unless-stopped

  upstream:
    build:
      context: ./backend/upstream
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - kalki-net
    restart: unless-stopped

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    environment:
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_SITE=datadoghq.com
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    networks:
      - kalki-net
    restart: unless-stopped

networks:
  kalki-net:
    driver: bridge

volumes:
  kalki-data:
