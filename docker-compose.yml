version: "3.8"

services:
  trakshya-api:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TRAKSHYA_MGMT_PORT=8000
      - TRAKSHYA_DUCKDB_PATH=/data/trakshya_events.duckdb
      - TRAKSHYA_FRONTEND_DIR=/opt/trakshya/frontend
      - TRAKSHYA_API_KEY=${TRAKSHYA_API_KEY:-}
    volumes:
      - trakshya-duckdb:/data
      - ./frontend:/opt/trakshya/frontend:ro
    networks:
      - trakshya-net
    restart: unless-stopped

  trakshya-proxy:
    build:
      context: ./rust
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TRAKSHYA_CONFIG=/etc/trakshya/config.yaml
      - TRAKSHYA_PROXY_PORT=8080
      - TRAKSHYA_UPSTREAM_URL=http://trakshya-api:8000
      - TRAKSHYA_MGMT_API_URL=http://trakshya-api:8000
      - TRAKSHYA_DUCKDB_PATH=/data/trakshya_events.duckdb
      - RUST_LOG=info
    volumes:
      - ./config/trakshya.yaml:/etc/trakshya/config.yaml:ro
      - trakshya-duckdb:/data:ro
    depends_on:
      - trakshya-api
    networks:
      - trakshya-net
    restart: unless-stopped

  trakshya-systemd:
    build:
      context: ./c
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    volumes:
      - /var/log:/var/log:ro
      - /etc:/etc:ro
      - trakshya-duckdb:/var/lib/trakshya
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    networks:
      - trakshya-net
    restart: unless-stopped

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    environment:
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_SITE=datadoghq.com
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    networks:
      - trakshya-net
    restart: unless-stopped

networks:
  trakshya-net:
    driver: bridge

volumes:
  trakshya-duckdb:
