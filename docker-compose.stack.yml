version: "3.8"

services:
  trakshya-api:
    build:
      context: .
      dockerfile: go/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TRAKSHYA_MGMT_PORT=8000
      - TRAKSHYA_DUCKDB_PATH=/data/trakshya_events.duckdb
      - TRAKSHYA_FRONTEND_DIR=/opt/trakshya/frontend
      - TRAKSHYA_API_KEY=${TRAKSHYA_API_KEY:-}
    volumes:
      - trakshya-duckdb:/data
      - ./frontend:/opt/trakshya/frontend:ro
    networks:
      - trakshya-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  trakshya-proxy:
    build:
      context: ./rust
      dockerfile: trakshya-proxy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TRAKSHYA_CONFIG=/etc/trakshya/config.yaml
      - TRAKSHYA_PROXY_PORT=8080
      - TRAKSHYA_UPSTREAM_URL=http://trakshya-api:8000
      - TRAKSHYA_MGMT_API_URL=http://trakshya-api:8000
      - TRAKSHYA_DUCKDB_PATH=/data/trakshya_events.duckdb
      - RUST_LOG=info
    volumes:
      - ./config/trakshya.yaml:/etc/trakshya/config.yaml:ro
      - trakshya-duckdb:/data:ro
    depends_on:
      trakshya-api:
        condition: service_healthy
    networks:
      - trakshya-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  trakshya-net:
    driver: bridge

volumes:
  trakshya-duckdb:
